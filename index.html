<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="color-scheme" content="dark" />
    <title>Respawn Society</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
    <style>
      :root {
        --bg0: #070a12;
        --bg1: #0b1020;
        --card: #0f1730cc;
        --card2: #0f1730a8;
        --line: #ffffff14;
        --text: #e9eeff;
        --muted: #b8c2ffb8;
        --muted2: #b8c2ff80;

        --a: #7c5cff;
        --b: #2de2e6;
        --c: #ff4fd8;

        --ok: #35f2a5;
        --warn: #ffcc66;

        --shadow: 0 22px 90px rgba(0, 0, 0, 0.55);
        --radius: 18px;
        --radius2: 26px;
        --max: 1120px;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family:
          "Space Grotesk",
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            1200px 800px at 20% 10%,
            rgba(124, 92, 255, 0.18),
            transparent 55%
          ),
          radial-gradient(
            900px 700px at 85% 20%,
            rgba(45, 226, 230, 0.14),
            transparent 55%
          ),
          radial-gradient(
            900px 700px at 55% 88%,
            rgba(255, 79, 216, 0.1),
            transparent 55%
          ),
          linear-gradient(180deg, var(--bg0), var(--bg1) 42%, #070a12 100%);
        overflow-x: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }
      button {
        font-family: inherit;
      }

      ::selection {
        background: rgba(124, 92, 255, 0.35);
        color: var(--text);
      }

      .container {
        width: 100%;
        max-width: var(--max);
        margin: 0 auto;
        padding: 20px;
      }

      .bg-grid {
        position: fixed;
        inset: -2px;
        z-index: -2;
        pointer-events: none;
        background:
          linear-gradient(
            to right,
            rgba(255, 255, 255, 0.05) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(255, 255, 255, 0.04) 1px,
            transparent 1px
          );
        background-size: 70px 70px;
        opacity: 0.18;
        mask-image: radial-gradient(
          circle at 50% 30%,
          black 0,
          black 45%,
          transparent 75%
        );
      }

      .glow {
        position: fixed;
        inset: 0;
        z-index: -3;
        pointer-events: none;
        background:
          radial-gradient(
            900px 600px at 20% 15%,
            rgba(124, 92, 255, 0.18),
            transparent 60%
          ),
          radial-gradient(
            800px 550px at 85% 25%,
            rgba(45, 226, 230, 0.14),
            transparent 60%
          ),
          radial-gradient(
            900px 650px at 55% 90%,
            rgba(255, 79, 216, 0.12),
            transparent 60%
          );
        filter: blur(0px);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 50;
        backdrop-filter: blur(18px);
        background: linear-gradient(
          180deg,
          rgba(7, 10, 18, 0.82),
          rgba(7, 10, 18, 0.55)
        );
        border-bottom: 1px solid var(--line);
      }

      .topbar-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 14px 0;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 220px;
      }

      .logo {
        width: 40px;
        height: 40px;
        border-radius: 14px;
        background: url("img/logo.jpg") center / contain no-repeat;
        box-shadow:
          0 14px 40px rgba(124, 92, 255, 0.18),
          0 10px 30px rgba(45, 226, 230, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.22);
      }

      .brand h1 {
        font-size: 15px;
        margin: 0;
        line-height: 1.2;
        letter-spacing: 0.2px;
      }
      .brand p {
        margin: 0;
        color: var(--muted2);
        font-size: 12px;
      }

      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
      }
      .nav a {
        font-size: 13px;
        color: var(--muted);
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid transparent;
        transition: 0.2s ease;
      }
      .nav a:hover {
        color: var(--text);
        border-color: rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
      }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: flex-end;
        min-width: 220px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .lang-btn {
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        padding: 8px 10px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 13px;
        transition: 0.2s ease;
      }
      .lang-btn:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.09);
      }
      .lang-btn[aria-pressed="true"] {
        border-color: rgba(124, 92, 255, 0.55);
        box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.18);
      }

      .hero {
        padding: 38px 0 18px;
      }

      .hero-wrap {
        position: relative;
        border-radius: var(--radius2);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background:
          radial-gradient(
            1200px 600px at 30% 10%,
            rgba(124, 92, 255, 0.22),
            transparent 55%
          ),
          radial-gradient(
            900px 550px at 85% 15%,
            rgba(45, 226, 230, 0.18),
            transparent 55%
          ),
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.08),
            rgba(255, 255, 255, 0.03)
          );
        box-shadow: var(--shadow);
      }

      .hero-inner {
        padding: 26px;
        display: grid;
        grid-template-columns: 1.25fr 0.75fr;
        gap: 18px;
      }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
        padding: 8px 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        width: fit-content;
      }

      .kicker .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--a), var(--b));
        box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.18);
      }

      .hero h2 {
        font-size: clamp(26px, 4vw, 44px);
        margin: 12px 0 10px;
        line-height: 1.06;
        letter-spacing: -0.6px;
      }

      .hero p {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 14.5px;
        line-height: 1.6;
        max-width: 62ch;
      }

      .cta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        cursor: pointer;
        transition: 0.2s ease;
        user-select: none;
        font-weight: 600;
        font-size: 13.5px;
      }

      .btn-primary {
        background: linear-gradient(
          135deg,
          rgba(124, 92, 255, 0.9),
          rgba(45, 226, 230, 0.75) 60%,
          rgba(255, 79, 216, 0.55)
        );
        border-color: rgba(255, 255, 255, 0.22);
        box-shadow: 0 16px 40px rgba(124, 92, 255, 0.18);
      }
      .btn-primary:hover {
        transform: translateY(-1px);
      }

      .btn-ghost {
        background: rgba(255, 255, 255, 0.06);
      }
      .btn-ghost:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.09);
      }

      .hero-side {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .stat {
        background: rgba(15, 23, 48, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 18px;
        padding: 14px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.25);
      }

      .stat .label {
        color: var(--muted2);
        font-size: 12px;
        margin: 0 0 6px;
      }
      .stat .value {
        font-size: 18px;
        font-weight: 700;
        margin: 0;
      }
      .stat .hint {
        color: var(--muted);
        font-size: 12.5px;
        margin: 8px 0 0;
        line-height: 1.35;
      }

      .section {
        padding: 18px 0;
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 12px;
        margin-bottom: 12px;
      }

      .section h3 {
        margin: 0;
        font-size: 18px;
        letter-spacing: -0.2px;
      }
      .section .sub {
        margin: 0;
        color: var(--muted);
        font-size: 13.5px;
        line-height: 1.55;
      }

      .grid {
        display: grid;
        gap: 12px;
      }
      .grid.two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .grid.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .card {
        background: rgba(15, 23, 48, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.25);
        overflow: hidden;
        position: relative;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -1px;
        background:
          radial-gradient(
            600px 300px at 25% 0%,
            rgba(124, 92, 255, 0.14),
            transparent 55%
          ),
          radial-gradient(
            500px 300px at 90% 10%,
            rgba(45, 226, 230, 0.1),
            transparent 55%
          );
        opacity: 0.9;
        pointer-events: none;
      }

      .card > * {
        position: relative;
      }

      .card-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.05);
        color: var(--muted);
      }

      .card h4 {
        margin: 0;
        font-size: 16px;
        letter-spacing: -0.2px;
      }
      .card p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 13.5px;
      }

      .list {
        margin: 10px 0 0;
        padding-left: 18px;
        color: var(--muted);
        line-height: 1.7;
        font-size: 13.5px;
      }
      .list li {
        margin: 6px 0;
      }

      .product {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .thumb {
        width: 100%;
        aspect-ratio: 16/9;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        overflow: hidden;
        background:
          radial-gradient(
            18px 18px at 25% 30%,
            rgba(255, 255, 255, 0.65),
            rgba(255, 255, 255, 0) 62%
          ),
          linear-gradient(
            135deg,
            rgba(124, 92, 255, 0.75),
            rgba(45, 226, 230, 0.55) 60%,
            rgba(255, 79, 216, 0.45)
          );
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
      }

      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .kv {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .kv span {
        font-size: 12px;
        color: var(--muted);
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.05);
        padding: 7px 10px;
        border-radius: 999px;
      }

      .team {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }

      .avatar {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        overflow: hidden;
        background:
          radial-gradient(
            16px 16px at 35% 35%,
            rgba(255, 255, 255, 0.85),
            rgba(255, 255, 255, 0) 60%
          ),
          linear-gradient(
            135deg,
            rgba(124, 92, 255, 0.65),
            rgba(45, 226, 230, 0.5) 60%,
            rgba(255, 79, 216, 0.4)
          );
        flex: 0 0 auto;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.22);
      }
      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .team h4 {
        margin: 2px 0 2px;
      }
      .role {
        margin: 0 0 8px;
        color: var(--muted2);
        font-size: 12.5px;
      }
      .meta {
        margin: 0;
        color: var(--muted);
        font-size: 13.5px;
        line-height: 1.6;
      }

      .footer {
        padding: 26px 0 38px;
        color: var(--muted2);
        font-size: 13px;
        border-top: 1px solid var(--line);
        margin-top: 18px;
      }

      .small {
        font-size: 12px;
        color: var(--muted2);
      }

      .hr {
        height: 1px;
        background: var(--line);
        margin: 12px 0;
      }

      @media (max-width: 980px) {
        .hero-inner {
          grid-template-columns: 1fr;
        }
        .brand {
          min-width: auto;
        }
        .actions {
          min-width: auto;
        }
      }

      @media (max-width: 760px) {
        .nav {
          display: none;
        }
        .grid.two {
          grid-template-columns: 1fr;
        }
        .grid.three {
          grid-template-columns: 1fr;
        }
        .hero {
          padding-top: 26px;
        }
        .btn {
          width: 100%;
        }
        .cta-row {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>

        // =========================
        // HELPERS
        // =========================
        function escapeHtml(str) {
          return String(str)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
        }

        function createImg(src, alt) {
          // onerror fallback to keep the layout clean
          const safeAlt = escapeHtml(alt);
          const safeSrc = escapeHtml(src);
          return `<img src="${safeSrc}" alt="${safeAlt}" loading="lazy" decoding="async"
      onerror="this.style.display='none';" />`;
        }

        function chips(list) {
          if (!Array.isArray(list) || list.length === 0) return "";
          return `<div class="kv">${list.map((x) => `<span>${escapeHtml(x)}</span>`).join("")}</div>`;
        }

        function sectionHead(title, sub) {
          return `
      <div class="section-head">
        <div>
          <h3>${escapeHtml(title)}</h3>
          <p class="sub">${escapeHtml(sub)}</p>
        </div>
      </div>
    `;
        }

        // =========================
        // RENDER
        // =========================
        function render(lang) {
          const c = CONTENT[lang] || CONTENT.id;

          document.documentElement.lang = lang === "en" ? "en" : "id";
          document.title = "Respawn Society";

          const navLinks = c.nav
            .map(
              (n) =>
                `<a href="#${escapeHtml(n.id)}">${escapeHtml(n.label)}</a>`,
            )
            .join("");

          const aboutCards = c.about.cards
            .map(
              (card) => `
      <div class="card">
        <div class="card-title">
          <h4>${escapeHtml(card.title)}</h4>
          <span class="badge">${escapeHtml(card.badge)}</span>
        </div>
        <p>${escapeHtml(card.body)}</p>
      </div>
    `,
            )
            .join("");

          const missionList = c.vmg.mission.list
            .map((li) => `<li>${escapeHtml(li)}</li>`)
            .join("");

          const productCards = c.products.items
            .map(
              (p) => `
      <div class="card product">
        <div class="thumb">
          ${createImg(p.image, p.name)}
        </div>
        <div class="card-title">
          <h4>${escapeHtml(p.name)}</h4>
          <span class="badge">${escapeHtml(p.tag)}</span>
        </div>
        <p>${escapeHtml(p.desc)}</p>
        <ul class="list">
          ${p.bullets.map((b) => `<li>${escapeHtml(b)}</li>`).join("")}
        </ul>
        ${chips(p.chips)}
      </div>
    `,
            )
            .join("");

          const teamCards = c.team.members
            .map(
              (m) => `
      <div class="card">
        <div class="team">
          <div class="avatar">
            ${createImg(m.image, m.name)}
          </div>
          <div>
            <h4>${escapeHtml(m.name)}</h4>
            <p class="role">${escapeHtml(m.role)}</p>
            <p class="meta">${escapeHtml(m.desc)}</p>
            ${chips(m.chips)}
          </div>
        </div>
      </div>
    `,
            )
            .join("");

          const contactItems = c.contact.ctas
            .map(
              (x) => `
      <div class="card">
        <div class="card-title">
          <h4>${escapeHtml(x.label)}</h4>
          <span class="badge">Info</span>
        </div>
        <p>${escapeHtml(x.value)}</p>
      </div>
    `,
            )
            .join("");

          const app = $("#app");
          app.innerHTML = `
      <div class="glow"></div>
      <div class="bg-grid"></div>

      <header class="topbar">
        <div class="container">
          <div class="topbar-inner">
            <a class="brand" href="#top" aria-label="Respawn Society Home">

            </div>
          </div>
        </section>
      </main>
    `;

          // wire buttons
          const btnId = $("#btn-id");
          const btnEn = $("#btn-en");

          if (btnId) btnId.addEventListener("click", () => setLang("id"));
          if (btnEn) btnEn.addEventListener("click", () => setLang("en"));
        }

        function setLang(lang) {
          const normalized = lang === "en" ? "en" : "id";
          // Keep state in URL hash for easy sharing: #en or #id
          const current = window.location.hash
            .replace("#", "")
            .trim()
            .toLowerCase();
          const base = current.startsWith("en")
            ? current.replace(/^en/, "")
            : current.startsWith("id")
              ? current.replace(/^id/, "")
              : current;
          const newHash = normalized + (base ? base : "");
          window.location.hash = newHash || normalized;
          render(normalized);
        }

        function getLangFromHash() {
          const h = window.location.hash.replace("#", "").trim().toLowerCase();
          if (h.startsWith("en")) return "en";
          if (h.startsWith("id")) return "id";
          return "id";
        }

        // Initial render
        render(getLangFromHash());

        // Re-render on hash change (e.g. user clicks nav anchors)
        window.addEventListener("hashchange", () => {
          const lang = getLangFromHash();
          // Only rerender if language part changes
          render(lang);
        });
      })();
    </script>
